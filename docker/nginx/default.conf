# ── HTTP → HTTPS redirect ────────────────────────────────────────────
server {
    listen 80;
    server_name _;
    return 301 https://$host:8088$request_uri;
}

server {
    listen 443 ssl;
    server_name _;

    ssl_certificate     /etc/nginx/ssl/councilofcrows.dv.pem;
    ssl_certificate_key /etc/nginx/ssl/councilofcrows.dv-key.pem;

    # Document root for Laravel – needed so try_files can resolve
    root /var/www/backend/public;
    index index.php;

    client_max_body_size 20M;

    # Use Docker's internal DNS so upstream hostnames are resolved at
    # request time, not at startup (prevents "host not found" on boot)
    resolver 127.0.0.11 valid=30s ipv6=off;

    # ── Laravel API (/api/* and /sanctum/*) ──────────────────────────
    location ~ ^/(api|sanctum) {
        try_files $uri $uri/ /index.php$is_args$args;
    }

    location ~ \.php$ {
        fastcgi_pass backend:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_read_timeout 120;
        include fastcgi_params;
    }

    # ── SvelteKit dev server (all other routes) ──────────────────────
    # Variable forces runtime DNS resolution via the resolver above
    location / {
        set $frontend http://frontend:5173;
        proxy_pass $frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300;
    }
}
