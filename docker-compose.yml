services:

  # ─────────────────────────────────────────────
  # Nginx – routes /api/* → Laravel, /* → Svelte
  # ─────────────────────────────────────────────
  nginx:
    image: nginx:stable-alpine
    ports:
      - "8088:443"
      - "8080:80"
    volumes:
      - ./backend:/var/www/backend:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend
    networks:
      - thinkertanker
    restart: unless-stopped

  # ─────────────────────────────────────────────
  # Laravel – PHP-FPM
  # ─────────────────────────────────────────────
  backend:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    volumes:
      - ./backend:/var/www/backend
    environment:
      APP_ENV: local
      APP_KEY: ${APP_KEY}
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-thinkertanker}
      DB_USERNAME: ${DB_USERNAME:-thinkertanker}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_BASE_URI: https://openrouter.ai/api/v1
      QUEUE_CONNECTION: redis
      CACHE_STORE: redis
      SESSION_DRIVER: redis
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - thinkertanker
    restart: unless-stopped

  # ─────────────────────────────────────────────
  # Laravel Queue Worker
  # ─────────────────────────────────────────────
  worker:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    command: php artisan queue:work --queue=debate,default --sleep=3 --tries=3 --timeout=120
    volumes:
      - ./backend:/var/www/backend
    environment:
      APP_ENV: local
      APP_KEY: ${APP_KEY}
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-thinkertanker}
      DB_USERNAME: ${DB_USERNAME:-thinkertanker}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_BASE_URI: https://openrouter.ai/api/v1
      QUEUE_CONNECTION: redis
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - thinkertanker
    restart: unless-stopped

  # ─────────────────────────────────────────────
  # SvelteKit – dev server (vite)
  # ─────────────────────────────────────────────
  frontend:
    build:
      context: ./docker/frontend
      dockerfile: Dockerfile
    volumes:
      - ./frontend:/app
    environment:
      PUBLIC_API_BASE: http://nginx/api
    ports:
      - "5173:5173"
    networks:
      - thinkertanker
    restart: unless-stopped

  # ─────────────────────────────────────────────
  # PostgreSQL 16 + pgvector
  # ─────────────────────────────────────────────
  db:
    image: pgvector/pgvector:pg16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${DB_DATABASE:-thinkertanker}
      POSTGRES_USER: ${DB_USERNAME:-thinkertanker}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-thinkertanker}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - thinkertanker
    restart: unless-stopped

  # ─────────────────────────────────────────────
  # Redis 7
  # ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - thinkertanker
    restart: unless-stopped

networks:
  thinkertanker:
    driver: bridge

volumes:
  pgdata:
  redisdata:
