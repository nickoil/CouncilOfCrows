services:

  # ─────────────────────────────────────────────
  # Nginx – routes /api/* → Laravel, /* → Svelte
  # ─────────────────────────────────────────────
  nginx:
    image: nginx:stable-alpine
    ports:
      - "8088:443"
      - "8080:80"
    volumes:
      - ./backend:/var/www/backend:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - reverb
      #- frontend
    networks:
      - councilofcrows
    restart: unless-stopped

  # ─────────────────────────────────────────────
  # Laravel – PHP-FPM
  # ─────────────────────────────────────────────
  backend:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    volumes:
      - ./backend:/var/www/backend
      - laravel-vendor:/var/www/backend/vendor
    environment:
      APP_NAME: "Council of Crows"
      APP_ENV: local
      APP_KEY: ${APP_KEY}
      APP_URL: ${APP_URL}
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-councilofcrows}
      DB_USERNAME: ${DB_USERNAME:-councilofcrows}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_BASE_URI: ${OPENROUTER_BASE_URI}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      QUEUE_CONNECTION: redis
      BROADCAST_CONNECTION: reverb
      CACHE_STORE: redis
      SESSION_DRIVER: redis
      REVERB_SERVER_HOST: 0.0.0.0
      REVERB_SERVER_PORT: 8080
      REVERB_HOST: reverb
      REVERB_PORT: 8080
      REVERB_SCHEME: http
      REVERB_APP_ID: ${REVERB_APP_ID:-councilofcrows}
      REVERB_APP_KEY: ${REVERB_APP_KEY:-councilofcrows-key}
      REVERB_APP_SECRET: ${REVERB_APP_SECRET:-councilofcrows-secret}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - councilofcrows
    restart: unless-stopped

  # ─────────────────────────────────────────────
  # Laravel Queue Worker
  # ─────────────────────────────────────────────
  worker:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    command: php artisan queue:work --queue=debate,default --sleep=3 --tries=3 --timeout=120
    volumes:
      - ./backend:/var/www/backend
      - laravel-vendor:/var/www/backend/vendor
    environment:
      APP_ENV: local
      APP_NAME: ${APP_NAME}
      APP_KEY: ${APP_KEY}
      APP_URL: ${APP_URL}
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-councilofcrows}
      DB_USERNAME: ${DB_USERNAME:-councilofcrows}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_BASE_URI: ${OPENROUTER_BASE_URI}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      QUEUE_CONNECTION: redis
      BROADCAST_CONNECTION: reverb
      CACHE_STORE: redis
      SESSION_DRIVER: redis
      REVERB_SERVER_HOST: 0.0.0.0
      REVERB_SERVER_PORT: 8080
      REVERB_HOST: reverb
      REVERB_PORT: 8080
      REVERB_SCHEME: http
      REVERB_APP_ID: ${REVERB_APP_ID:-councilofcrows}
      REVERB_APP_KEY: ${REVERB_APP_KEY:-councilofcrows-key}
      REVERB_APP_SECRET: ${REVERB_APP_SECRET:-councilofcrows-secret}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - councilofcrows
    restart: unless-stopped

  # ─────────────────────────────────────────────
  # SvelteKit – dev server (vite)
  # ─────────────────────────────────────────────
  # for dev running directly with npm run dev
  #frontend:
  #  build:
  #    context: ./docker/frontend
  #    dockerfile: Dockerfile
  #  volumes:
  #    - ./frontend:/app
  #  environment:
  #    PUBLIC_API_BASE: http://nginx/api
  #  ports:
  #    - "5173:5173"
  #  networks:
  #    - councilofcrows
  #  restart: unless-stopped

  # ─────────────────────────────────────────────
  # Laravel Reverb - websocket server
  # ─────────────────────────────────────────────
  reverb:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    command: php artisan reverb:start --host=0.0.0.0 --port=8080
    volumes:
      - ./backend:/var/www/backend
      - laravel-vendor:/var/www/backend/vendor
    environment:
      APP_ENV: local
      APP_NAME: ${APP_NAME}
      APP_KEY: ${APP_KEY}
      APP_URL: ${APP_URL}
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-councilofcrows}
      DB_USERNAME: ${DB_USERNAME:-councilofcrows}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      BROADCAST_CONNECTION: reverb
      CACHE_STORE: redis
      SESSION_DRIVER: redis
      REVERB_SERVER_HOST: 0.0.0.0
      REVERB_SERVER_PORT: 8080
      REVERB_HOST: reverb
      REVERB_PORT: 8080
      REVERB_SCHEME: http
      REVERB_APP_ID: ${REVERB_APP_ID:-councilofcrows}
      REVERB_APP_KEY: ${REVERB_APP_KEY:-councilofcrows-key}
      REVERB_APP_SECRET: ${REVERB_APP_SECRET:-councilofcrows-secret}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - councilofcrows
    restart: unless-stopped

  # ─────────────────────────────────────────────
  # PostgreSQL 16 + pgvector
  # ─────────────────────────────────────────────
  db:
    image: pgvector/pgvector:pg16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${DB_DATABASE:-councilofcrows}
      POSTGRES_USER: ${DB_USERNAME:-councilofcrows}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-councilofcrows}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - councilofcrows
    restart: unless-stopped

  # ─────────────────────────────────────────────
  # Redis 7
  # ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - councilofcrows
    restart: unless-stopped

networks:
  councilofcrows:
    driver: bridge

volumes:
  pgdata:
  redisdata:
  laravel-vendor:
